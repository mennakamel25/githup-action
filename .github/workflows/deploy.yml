name: Deployment
on:
  push:
    branches:
      - main
      - release/*
      - master
env:
    NODE_ENV: ${{ secrets.NODE_ENV }}
    name_database: ${{ secrets.name_database }} 
jobs:
  test:
    environment: testing
    runs-on: ubuntu-latest
    env:
      NODE_ENV: testing
      name_database: menna_test
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: |
         npm ci
         echo "${secrets.name_database}"
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:XYZ
      - name: Run tests
        run: npm test
      - name: Output information
        run: echo "..."
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "..."
