name: matrix

on:
  workflow_dispatch: 
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [12, 14]
        os: [ubuntu-latest, windows-latest]

        include:
          - node-version: 18
            os: ubuntu-latest

        exclude:
          - node-version: 12
            os: windows-latest

    steps:
      - name: Get code
        uses: actions/checkout@v3  

      - name: Setup Node
        uses: actions/setup-node@v3  
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app
        run: npm build