name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: echo "Running lint..."

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      # لو عندك build script سيبيه، لو لأ امسحيه
      - name: Build app
        run: echo "Building app..."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: .

  deploy:
    needs: build
    uses: ./.github/workflows/reuse.yml  
    with:
      artifact-name: dist-folder

  print-result:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Print Deploy URL
        run: echo "Deploy URL: ${{ needs.deploy.outputs.deploy-url }}"