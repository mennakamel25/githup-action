name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: echo "Running lint..."

  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Checking out code..."

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: .


  deploy:
    
    needs: build

    uses: ./.github/workflows/reuse.yml  
    with:
       artifact-name: dist-folder